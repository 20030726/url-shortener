<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
  </head>
  <body>
    <div id="app">
      <div class="card">
        <div class="header">
          <h1>🔗 URL Shortener</h1>
          <p class="subtitle">Paste a long URL and get a short link instantly</p>
        </div>
        <form id="shorten-form">
          <div class="input-group">
            <input
              type="url"
              id="url-input"
              placeholder="https://example.com/very/long/url..."
              required
              autocomplete="off"
            />
            <button type="submit" id="shorten-btn">Shorten</button>
          </div>
          <p id="error-msg" class="error" aria-live="polite"></p>
        </form>
        <div id="result" class="result hidden">
          <p class="result-label">Your short URL:</p>
          <div class="result-row">
            <a id="short-url" href="" target="_blank" rel="noopener noreferrer"></a>
            <button id="copy-btn" type="button" title="Copy to clipboard">Copy</button>
          </div>
        </div>
        <ul id="history" class="history"></ul>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
